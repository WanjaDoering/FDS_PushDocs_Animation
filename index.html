<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>pushdocs — Animated Header Graphic</title>
<style>
  :root {
    --fds-text: #060608;
    --fds-blue: #003B86;
    --fds-grey: #DDE1EA;
    --fds-bg-grey: #F7F7F7;
    --fds-white: #FFFFFF;
  }

  * { box-sizing: border-box; }

  /* Minimal preview shell — when embedding, only the .pushdocs-anim element
     (plus its styles below) is needed. */
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--fds-text);
    background: var(--fds-white);
  }
  .preview-shell {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* ═══ Animation Container — geometry assumes aspect 12:5 (viewBox 1200x500) ═══ */
  .pushdocs-anim {
    position: relative;
    width: 100%;
    aspect-ratio: 12 / 5;
    background: var(--fds-white);
    overflow: hidden;
  }

  /* ─── SVG: dashed paths + flowing dots ─── */
  .pushdocs-anim svg.lines {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  .dashed-path {
    fill: none;
    stroke: #c8ccd4;
    stroke-width: 1.2;
    stroke-dasharray: 4 6;
    animation: dash-flow 1.6s linear infinite;
  }
  @keyframes dash-flow { to { stroke-dashoffset: -10; } }
  .flow-dot {
    fill: var(--fds-blue);
    r: 3.5;
  }
  .flow-dot.in1  { animation: flow-anim 2.1s linear infinite 0.0s; }
  .flow-dot.in2  { animation: flow-anim 2.1s linear infinite 1.05s; }
  .flow-dot.o1a  { animation: flow-anim 2.5s linear infinite 0.0s; }
  .flow-dot.o1b  { animation: flow-anim 2.5s linear infinite 1.25s; }
  .flow-dot.o2a  { animation: flow-anim 2.5s linear infinite 0.3s; }
  .flow-dot.o2b  { animation: flow-anim 2.5s linear infinite 1.55s; }
  .flow-dot.o3a  { animation: flow-anim 2.5s linear infinite 0.6s; }
  .flow-dot.o3b  { animation: flow-anim 2.5s linear infinite 1.85s; }
  .flow-dot.o4a  { animation: flow-anim 2.5s linear infinite 0.9s; }
  .flow-dot.o4b  { animation: flow-anim 2.5s linear infinite 2.15s; }
  .flow-dot.label-dot {
    fill: var(--fds-blue);
    r: 3;
  }
  @keyframes flow-anim {
    0%   { offset-distance: 0%; opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 1; }
    100% { offset-distance: 100%; opacity: 0; }
  }
  .label-dot { fill: var(--fds-blue); r: 3; }

  /* ─── 3-column grid: source / hub / targets ─── */
  .anim-grid {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: 1fr 1fr 1.4fr;
    width: 100%;
    height: 100%;
    align-items: center;
  }

  /* ─── SOURCE: app window mockup ─── */
  .source-col {
    display: flex;
    justify-content: center;
    padding: 0 12px;
  }
  .source-window {
    width: 96%;
    max-width: 380px;
    background: var(--fds-white);
    border: 1px solid var(--fds-grey);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    overflow: hidden;
    font-size: 11px;
  }
  .source-window .titlebar {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    background: var(--fds-bg-grey);
    border-bottom: 1px solid var(--fds-grey);
    gap: 10px;
    position: relative;
  }
  .source-window .titlebar .dots {
    display: flex;
    gap: 5px;
  }
  .source-window .titlebar .dots span {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #d8dce2;
  }
  .source-window .titlebar .url {
    flex: 1;
    background: var(--fds-white);
    border: 1px solid var(--fds-grey);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 10px;
    color: #98a0b0;
    text-align: center;
  }
  .source-window .body {
    min-height: 220px;
  }
  .source-window .main {
    padding: 14px 18px;
  }
  .source-window .tabs {
    display: flex;
    gap: 14px;
    border-bottom: 1px solid var(--fds-grey);
    margin: 0 0 10px;
    position: relative;
  }
  .source-window .tab {
    padding: 4px 2px 6px;
    font-size: 10.5px;
    color: #98a0b0;
    position: relative;
  }
  .source-window .tab.active {
    color: var(--fds-blue);
    font-weight: 600;
  }
  .source-window .tab.active::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: -1px;
    height: 2px;
    background: var(--fds-blue);
    border-radius: 1px;
  }
  .source-window .doc-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .source-window .doc-row {
    display: grid;
    grid-template-columns: 16px 1fr 60px;
    align-items: center;
    gap: 8px;
    padding: 6px 10px 6px 6px;
    border-radius: 5px;
    background: var(--fds-bg-grey);
  }
  .source-window .doc-row .icon {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    background: rgba(0,59,134,0.12);
    color: var(--fds-blue);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .source-window .doc-row .icon svg { width: 10px; height: 10px; }
  .source-window .doc-row .meta {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .source-window .doc-row .name {
    font-size: 10.5px;
    color: var(--fds-text);
    font-weight: 500;
  }
  .source-window .doc-row .date {
    font-size: 9.5px;
    color: #98a0b0;
  }
  .source-window .doc-row .status {
    font-size: 9px;
    text-align: center;
    padding: 2px 5px;
    border-radius: 3px;
    background: rgba(0,59,134,0.12);
    color: var(--fds-blue);
    font-weight: 600;
    text-transform: uppercase;
  }
  .source-window .doc-row .status.ok { background: rgba(34,139,72,0.14); color: #228b48; }

  /* ─── HUB: pushdocs center ─── */
  .hub-col {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hub {
    position: relative;
    width: 130px;
    height: 130px;
    background: var(--fds-white);
    border-radius: 50%;
    box-shadow: 0 0 0 1px var(--fds-grey), 0 14px 36px rgba(0, 59, 134, 0.10);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: hub-pulse 4s ease-in-out infinite;
  }
  .hub img { width: 70px; height: 70px; object-fit: contain; }
  .hub .label {
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 15px;
    font-weight: 700;
    color: var(--fds-text);
    white-space: nowrap;
  }
  @keyframes hub-pulse {
    0%, 100% { box-shadow: 0 0 0 1px var(--fds-grey), 0 14px 36px rgba(0, 59, 134, 0.10); }
    50%      { box-shadow: 0 0 0 1px var(--fds-grey), 0 14px 44px rgba(0, 59, 134, 0.22); }
  }

  /* ─── TARGETS: 4 fixed category rows ─── */
  .targets-col {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
    padding-left: 60px;   /* labels sit right → room for the S-curves */
    padding-right: 12px;
    height: 100%;
  }
  .target-row {
    display: grid;
    grid-template-columns: 130px 1fr;
    align-items: center;
    gap: 12px;
    height: 50px;
  }
  .target-row .cat-label {
    font-size: 13px;
    color: var(--fds-text);
    font-weight: 600;
    text-align: right;
    padding-right: 4px;
  }
  .target-row .slots {
    display: flex;
    gap: 8px;
  }
  .target-row .slot {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    background: var(--fds-bg-grey);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #ECEEF2;
  }
  .target-row .slot img {
    width: 24px;
    height: 24px;
    object-fit: contain;
    filter: brightness(0);   /* unified black silhouette */
  }
  .target-row .slot .text-logo {
    font-size: 10px;
    font-weight: 800;
    color: var(--fds-text);
    letter-spacing: 0.02em;
  }

  /* Responsive: stack vertically on narrow screens, hide connector lines */
  @media (max-width: 760px) {
    .anim-grid { grid-template-columns: 1fr; gap: 28px; padding: 24px 0; }
    .pushdocs-anim { aspect-ratio: auto; min-height: 780px; }
    .targets-col { padding-left: 0; align-items: center; }
    .target-row { grid-template-columns: 130px 1fr; }
    .hub .label { bottom: -24px; }
    svg.lines { display: none; }
  }
</style>
</head>
<body>

<div class="preview-shell">

  <div class="pushdocs-anim">

    <!-- ─── Layer 1: SVG dashed paths + flowing dots ─── -->
    <!-- viewBox 1200x500 matches container aspect 12:5 -->
    <svg class="lines" viewBox="0 0 1200 500" preserveAspectRatio="none">
      <!-- INFLOW: source window right edge (x≈352) → hub left edge (x≈505) -->
      <path id="p-in" class="dashed-path" d="M 352 250 L 505 250" />

      <!-- OUTFLOW: Merge-style S-curves with horizontal tangents on both ends.
           All four paths end at the SAME x (786), aligned in a vertical column,
           just before the widest category label ("API & Webhook", ~x=794).
           Row y centers: 154, 218, 282, 346.
           If the page font changes, label widths shift — nudge the end-x here,
           on the label-dot cx values, and in the matching offset-path strings. -->
      <path id="p-o1" class="dashed-path" d="M 625 250 C 700 250, 700 154, 766 154 L 786 154" />
      <path id="p-o2" class="dashed-path" d="M 625 250 C 700 250, 700 218, 766 218 L 786 218" />
      <path id="p-o3" class="dashed-path" d="M 625 250 C 700 250, 700 282, 766 282 L 786 282" />
      <path id="p-o4" class="dashed-path" d="M 625 250 C 700 250, 700 346, 766 346 L 786 346" />

      <!-- Static dots at the aligned end of each path -->
      <circle class="label-dot" cx="786" cy="154" />
      <circle class="label-dot" cx="786" cy="218" />
      <circle class="label-dot" cx="786" cy="282" />
      <circle class="label-dot" cx="786" cy="346" />

      <!-- Flowing dots: 2 per path (inflow + 4 outflows) = 10 dots total -->
      <circle class="flow-dot in1" style="offset-path: path('M 352 250 L 505 250');" />
      <circle class="flow-dot in2" style="offset-path: path('M 352 250 L 505 250');" />
      <circle class="flow-dot o1a" style="offset-path: path('M 625 250 C 700 250, 700 154, 766 154 L 786 154');" />
      <circle class="flow-dot o1b" style="offset-path: path('M 625 250 C 700 250, 700 154, 766 154 L 786 154');" />
      <circle class="flow-dot o2a" style="offset-path: path('M 625 250 C 700 250, 700 218, 766 218 L 786 218');" />
      <circle class="flow-dot o2b" style="offset-path: path('M 625 250 C 700 250, 700 218, 766 218 L 786 218');" />
      <circle class="flow-dot o3a" style="offset-path: path('M 625 250 C 700 250, 700 282, 766 282 L 786 282');" />
      <circle class="flow-dot o3b" style="offset-path: path('M 625 250 C 700 250, 700 282, 766 282 L 786 282');" />
      <circle class="flow-dot o4a" style="offset-path: path('M 625 250 C 700 250, 700 346, 766 346 L 786 346');" />
      <circle class="flow-dot o4b" style="offset-path: path('M 625 250 C 700 250, 700 346, 766 346 L 786 346');" />
    </svg>

    <!-- ─── Layer 2: 3-column grid ─── -->
    <div class="anim-grid">

      <!-- SOURCE: app window mockup -->
      <div class="source-col">
        <div class="source-window">
          <div class="titlebar">
            <div class="dots"><span></span><span></span><span></span></div>
            <div class="url">app.example.com / dokumente</div>
          </div>
          <div class="body">
            <div class="main">
              <div class="tabs">
                <div class="tab active">Aktiv</div>
                <div class="tab">Archiv</div>
                <div class="tab">Fehler</div>
              </div>
              <div class="doc-list">
                <div class="doc-row">
                  <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 3v5h5M7 3h7l5 5v13a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/></svg></div>
                  <div class="meta">
                    <div class="name">Rechnung_2026-014.pdf</div>
                    <div class="date">11.06.2026 · 142 KB</div>
                  </div>
                  <div class="status ok">OK</div>
                </div>
                <div class="doc-row">
                  <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 3v5h5M7 3h7l5 5v13a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/></svg></div>
                  <div class="meta">
                    <div class="name">Vertrag_AGB_v3.pdf</div>
                    <div class="date">10.06.2026 · 218 KB</div>
                  </div>
                  <div class="status ok">OK</div>
                </div>
                <div class="doc-row">
                  <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 3v5h5M7 3h7l5 5v13a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/></svg></div>
                  <div class="meta">
                    <div class="name">Beleg_Reise_DE.pdf</div>
                    <div class="date">09.06.2026 · 88 KB</div>
                  </div>
                  <div class="status">Senden</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- HUB: pushdocs logo -->
      <div class="hub-col">
        <div class="hub">
          <img src="assets/pushdocs.svg" alt="pushdocs" />
          <div class="label">pushdocs</div>
        </div>
      </div>

      <!-- TARGETS: 4 fixed-category rows, 4 logos each -->
      <div class="targets-col">

        <div class="target-row">
          <div class="cat-label">Buchhaltung</div>
          <div class="slots">
            <div class="slot"><img src="assets/logos/datev.svg" alt="DATEV" /></div>
            <div class="slot"><img src="assets/logos/lexware.svg" alt="Lexware" /></div>
            <div class="slot"><img src="assets/logos/sevdesk.svg" alt="sevdesk" /></div>
            <div class="slot"><img src="assets/logos/sage.svg" alt="Sage" /></div>
          </div>
        </div>

        <div class="target-row">
          <div class="cat-label">Cloud Storage</div>
          <div class="slots">
            <div class="slot"><img src="assets/logos/dropbox.svg" alt="Dropbox" /></div>
            <div class="slot"><img src="assets/logos/onedrive.svg" alt="OneDrive" /></div>
            <div class="slot"><img src="assets/logos/google-drive.svg" alt="Google Drive" /></div>
            <div class="slot"><img src="assets/logos/box.svg" alt="Box" /></div>
          </div>
        </div>

        <div class="target-row">
          <div class="cat-label">API &amp; Webhook</div>
          <div class="slots">
            <div class="slot"><img src="assets/logos/rest-api.svg" alt="REST API" /></div>
            <div class="slot"><img src="assets/logos/oauth.svg" alt="OAuth 2.0" /></div>
            <div class="slot"><img src="assets/logos/webhook.svg" alt="Webhook" /></div>
            <div class="slot"><img src="assets/logos/graphql.svg" alt="GraphQL" /></div>
          </div>
        </div>

        <div class="target-row">
          <div class="cat-label">Transfer</div>
          <div class="slots">
            <div class="slot"><img src="assets/logos/sftp.svg" alt="SFTP" /></div>
            <div class="slot"><img src="assets/logos/webdav.svg" alt="WebDAV" /></div>
            <div class="slot"><img src="assets/logos/ftp.svg" alt="FTP" /></div>
            <div class="slot"><div class="text-logo">S3</div></div>
          </div>
        </div>

      </div>
    </div>
  </div>

</div>

</body>
</html>
